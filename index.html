<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do & Task Tracker App </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header> 
        <h1>Todo App</h1>
    </header>
    <main>
        <nav class="filter_tabs">
            <button type="button" class="tab_btn active">Today</button>
            <button type="button" class="tab_btn">Pending</button>
            <button type="button" class="tab_btn">Overdue</button>
        </nav>
        <section class="tasks_container">
            <div class="tasks_header">
            <h2>Tasks</h2>
            <div class="input_group">
                <input type="text" id="task_input" placeholder="Enter a new task ...">
                <input type="date" id="task_date">
            </div>
            <button type="button" id="add_task_btn">+ Add Task</button>
            </div>
            <ul id="task_list">  

            </ul>
        </section>
        <section class="completed_section">
            <h3>Completed</h3>
            <ul id="completed_list">
            </ul>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
