<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do & Task Tracker App </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  </head>
<body class=" bg-light d-flex flex-column align-items-center py-5 px-3">
    <header> 
        <h1>Todo App</h1>
    </header>
    <main class="bg-white w-100 rounded-4 p-4 shadow -sm" style="max-width: 600px;">
        <nav class="filter_tabs d-flex gap-2 mb-4">
            <button type="button" class="tab_btn active btn btn-dark w-100 fw- semibold py-2">Today</button>
            <button type="button" class=" tab_btn btn btn-light text-secondary w-100 fw-semibold py-2">Pending</button>
            <button type="button" class="tab_btn btn btn-light text-secondary w-100 fw-semibold py-2">Overdue</button>
        </nav>
        <section class="tasks_container mb-4">
            <div class="tasks_header d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 fw-bold m-0">Tasks</h2>
            <button type="button" id="add_task_btn" class="btn btn-succes rounded-pill btn-sm px-3 fw-semibold">+ Add Task</button>
            </div>
            <ul id="task_list" class="list-unstyled p-0">  
                <li class="d-flex align-items-center p-3 mb-2 border rounded-3 bg-white">
                    <input type="checkbox" class="form-check-input me-3">
                    <span class="flex-grow-1 fw-medium text-secondary">Draft Project Proposal </span>
                    <time class="badge bg-body-secondary text-dark fw-normal me-2">Tue Oct 17 2023</time>
                    <button type="button" class="edit_btn btn btn-sm btn-secondary opacity-75 me-1">Edit</button>
                    <button type="button" class="delete_btn btn btn-sm btn-danger text-danger bg-danger-subtle border-0">Delete</button>    
                </li>
            </ul>
        </section>
        <section class="completed_section mt-4">
            <h3 class="h6 text-muted fw-bold mb-3">Completed</h3>
            <ul id="completed_list" class="list-unstyled p-0 m-0">
                <li class="d-flex align-items-center p-3 mb-2 border rounded-3 bg-light opacity-50">
            
                    <input type="checkbox" class="form-check-input me-3" checked disabled>
            
                    <span class="flex-grow-1 text-secondary text-decoration-line-through">Finished Old Task</span>
            
                </li>
                    
            </ul>
        </section>
    </main>

</body>
</html>
